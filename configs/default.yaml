console:
    callBaseURL: "http://localhost:8082"
    dialpad:
        version: "1.0.0"
        forceUpdate: false
        changelog: "云枢拨号盘初始版本发布"
        rustfs:
            endpoint: "http://127.0.0.1:9000"
            accessKey: "rustfsadmin"
            secretKey: "rustfsadmin"
            bucket: "yunshu-updates"
freeswitch:
    commandTimeout: 5s
    eventLeaseTTL: 30s
    kamailioAddr: "192.168.107.2:5060"
    kamailioWSPort: 5066
    sipDomain: "sip.yunshu.local"
    nodes: []
    reconnect:
        interval: 5s
        maxAttempts: 30
logging:
    format: json
    level: info
mysql:
    connMaxLifetime: 1h
    dsn: root:db123456@tcp(127.0.0.1:3306)/yunshu?charset=utf8mb4&parseTime=True&loc=Local
    maxIdleConns: 10
    maxOpenConns: 100
rabbitmq:
    url: amqp://guest:guest@127.0.0.1:5672/
redis:
    addrs:
        - 127.0.0.1:63790
    db: 0
    readTimeout: 3s
    stream:
        batchSize: 16
        block: 5s
        claimMinIdle: 1m
        consumer: cc-call-local
        enabled: false
        group: cc-call
        startFromFirst: false
        stream: yunshu:events
    writeTimeout: 3s
service:
    addr: :8080
    name: cc-call
tenant:
    defaultMerchantId: 1001
    mode: single
worker:
    billing:
        defaultRatePerMin: 0
    callback:
        secret: ""
        timeout: 5s
        url: ""
    downstream:
        secret: ""
        timeout: 5s
        url: ""
    outbox:
        batchSize: 100
        interval: 5s
        lease: 30s
        retryDelay: 1m
        workerId: cc-worker-local
    recording:
        secret: ""
        timeout: 5s
        url: ""
        oss:
            endpoint: ""
            accessKey: ""
            secretKey: ""
            bucket: "recordings"
            baseDir: "/recordings"
            cdnBaseURL: ""
# AI/RAG 功能配置
ai:
    # 是否启用 AI 功能
    enabled: false
    # 嵌入模型配置
    embedder:
        provider: "openai"
        apiKey: ""
        endpoint: ""
        model: "text-embedding-3-small"
    # 向量数据库配置
    vectorDB:
        type: "memory"
        address: "http://127.0.0.1:6333"
        collection: "yunshu_knowledge"
    # RAG 检索增强生成配置
    rag:
        topK: 5
        scoreThreshold: 0.7
        maxTokens: 4000

# =========================================================================
# Kamailio v6.1.2 生产级高可用话务代理与 SIP 注册服务器配置 (kamailio.cfg)
# =========================================================================
# 架构与业务特性说明:
#   1. 信令媒体分离设计: 坐席终端/分机只向 Kamailio 注册，FreeSWITCH 只作媒体/话务负载与呼叫流转。
#   2. RTPEngine 深度整合: 提供 NAT 穿透、普通 SIP 话机与 WebRTC(WSS/DTLS-SRTP) 音频自适应转码桥接与 ICE 生成。
#   3. HTTP Webhook 实时回调 (方案 B): REGISTER 注册与注销采用事务级后台分支机制 (t_newtran + t_on_branch)
#      实现非阻塞的 HTTP 异步推送，直接推送至 Go 后端 cc-call 的 /cti/kamailio/auth 接口，状态同步极速且稳定。
#   4. FreeSWITCH 动态路由与主备容灾 (Dispatcher): 通过数据库动态加载 FreeSWITCH 媒体服务器节点，
#      自动 OPTIONS 心跳探测并具备节点故障时故障转移 (failover) 自动轮询下一个可用节点能力。
# =========================================================================

#!define WITH_MYSQL
#!define WITH_AUTH
#!define WITH_USRLOCDB
#!define WITH_WEBSOCKETS
#!define WITH_NAT
#!define WITH_RTPENGINE

# -------------------------------------------------------------------------
# 环境可配置宏定义 (IP 与端口配置)
# -------------------------------------------------------------------------
#!substdef "!MY_SIP_PORT!5060!g"
#!substdef "!MY_WS_PORT!5066!g"
#!substdef "!MY_IP4_ADDR!127.0.0.1!g"

# 默认基础配置参数 (可通过命令行 -A/--substdef 覆盖)
#!trydef DEFAULT_MYSQL_ADDR "mysql://root:db123456@127.0.0.1:3306/yunshu"
#!trydef DEFAULT_HTTP_ADDR "127.0.0.1:8082"
#!trydef DEFAULT_RTPENGINE_SOCK "udp:127.0.0.1:2223"
#!trydef DEFAULT_EXTERNAL_IP "127.0.0.1"

# 将业务参数与基础配置参数进行绑定
#!substdef "!EXTERNAL_MYSQL_ADDRESS!DEFAULT_MYSQL_ADDR!g"
#!substdef "!EXTERNAL_HTTP_IP_ADDR!DEFAULT_HTTP_ADDR!g"
#!substdef "!MY_RTPENGINE_SOCK!DEFAULT_RTPENGINE_SOCK!g"
#!substdef "!EXTERNAL_IP_ADDR!DEFAULT_EXTERNAL_IP!g"

# 数据库配置 URL
#!ifdef WITH_MYSQL
#!ifndef DBURL
#!trydef DBURL "EXTERNAL_MYSQL_ADDRESS"
#!endif
#!endif

# -------------------------------------------------------------------------
# 全局基本参数与工作线程数配置
# -------------------------------------------------------------------------
debug=2
log_stderror=no
log_facility=LOG_LOCAL0
log_prefix="[KAMAILIO-6.1.2] "

# 全局 TCP 选项
tcp_accept_no_cl=yes

# 监听套接字设置
listen=udp:0.0.0.0:MY_SIP_PORT          # 传统 SIP 普通 UDP 端口
listen=tcp:0.0.0.0:MY_SIP_PORT          # 传统 SIP 普通 TCP 端口
listen=tcp:0.0.0.0:MY_WS_PORT           # WebRTC SIP-over-WebSocket 端口

# 全局工作线程数
children=8

# -------------------------------------------------------------------------
# 模块加载路径及核心模块加载 (Kamailio v6.1.2 格式)
# -------------------------------------------------------------------------
mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

# 基础依赖模块
loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "textopsx.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "jansson.so"
loadmodule "xhttp.so"

# 数据库驱动模块
#!ifdef WITH_MYSQL
loadmodule "db_mysql.so"
#!endif

# 鉴权模块
#!ifdef WITH_AUTH
loadmodule "auth.so"
loadmodule "auth_db.so"
#!endif

# WebRTC & NAT 模块
#!ifdef WITH_WEBSOCKETS
loadmodule "websocket.so"
#!endif
#!ifdef WITH_NAT
loadmodule "nathelper.so"
#!endif
#!ifdef WITH_RTPENGINE
loadmodule "rtpengine.so"
#!endif

# 负载均衡与调度器
loadmodule "dispatcher.so"

# HTTP 外发 Webhook 模块
loadmodule "http_client.so"

# -------------------------------------------------------------------------
# 模块参数配置 (Parameters)
# -------------------------------------------------------------------------

# ----- jsonrpcs params -----
modparam("jsonrpcs", "pretty_format", 1)

# ----- tm params -----
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 3000)
modparam("tm", "fr_inv_timer", 120000)

# ----- rr params -----
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)

# ----- usrloc params -----
#!ifdef WITH_USRLOCDB
modparam("usrloc", "db_url", DBURL)
modparam("usrloc", "db_mode", 1) # Write-Through (实时入库)
#!else
modparam("usrloc", "db_mode", 0) # 仅本地内存
#!endif
modparam("usrloc", "nat_bflag", 6)
modparam("usrloc", "use_domain", 1)

# ----- registrar params -----
modparam("registrar", "max_expires", 3600)
modparam("registrar", "default_expires", 120)
modparam("registrar", "use_path", 1)

# ----- auth_db params -----
#!ifdef WITH_AUTH
modparam("auth_db", "db_url", DBURL)
modparam("auth_db", "calculate_ha1", 1)
modparam("auth_db", "password_column", "password")
modparam("auth_db", "load_credentials", "")
#!endif

# ----- rtpengine params -----
#!ifdef WITH_RTPENGINE
modparam("rtpengine", "db_url", DBURL)
modparam("rtpengine", "table_name", "kamailio_rtpengine")
modparam("rtpengine", "setid_col", "set_id")
modparam("rtpengine", "url_col", "rtpengine_sock")
modparam("rtpengine", "extra_id_pv", "$ci")
#!endif

# ----- nathelper params -----
#!ifdef WITH_NAT
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper|registrar", "received_avp", "$avp(RECEIVED)")
#!endif

# ----- dispatcher params (FreeSWITCH 负载均衡) -----
modparam("dispatcher", "db_url", DBURL)
modparam("dispatcher", "table_name", "kamailio_dispatcher")
modparam("dispatcher", "setid_col", "set_id")
modparam("dispatcher", "ds_probing_threshold", 3)
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "xavp_dst", "_dsdst_")
modparam("dispatcher", "xavp_ctx", "_dsctx_")
modparam("dispatcher", "ds_ping_from", "sip:monitor@EXTERNAL_IP_ADDR:MY_SIP_PORT")
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_ping_interval", 30)
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_timer_mode", 1)

# ----- http_client params -----
# 方案 B Webhook 异步推送目标连接，映射至 cc-call HTTP 端口 8082
modparam("http_client", "useragent", "Kamailio Yunshu Gateway")
modparam("http_client", "connection_timeout", 5)
modparam("http_client", "keep_connections", 1)
modparam("http_client", "httpcon", "ctiserver=>http://EXTERNAL_HTTP_IP_ADDR")

# -------------------------------------------------------------------------
# 主路由逻辑 (Main Route Block)
# -------------------------------------------------------------------------
request_route {
    # 1. 基础安全和合法性校验
    if (!sanity_check("1511", "7")) {
        xlog("L_WARN", "收到非法或畸形 SIP 报文，已丢弃\n");
        exit;
    }

    if (msg:len >= 20480) {
        sl_send_reply("513", "Message Too Large");
        exit;
    }

    # 2. 环路与防刷校验
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # 3. 处理 WebSocket 握手事务
    if (is_method("GET") && (proto == WS || proto == WSS)) {
        if (ws_handle_handshake()) {
            exit;
        }
        sl_send_reply("400", "Bad Request");
        exit;
    }

    # 4. 事务重传前置检查
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # 5. CANCEL 事务处理
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # 6. 会话内中继路由处理
    route(WITHINDLG);

    # 7. 注册鉴权与用户校验
    route(AUTH);

    # 移除 Route 头域以执行严格路由转发
    remove_hf("Route");
    if (is_method("INVITE|SUBSCRIBE|REFER")) {
        record_route();
    }

    # 8. REGISTER 注册核心路由 (方案 B 后台事务触发点)
    if (is_method("REGISTER")) {
        route(REGISTRAR);
        exit;
    }

    # 9. 检测主/被叫 NAT 场景
    route(NATDETECT);

    # 空用户名地址限制
    if ($rU == $null) {
        sl_send_reply("484", "Address Incomplete");
        exit;
    }

    # 10. 处理通话呼叫 INVITE 等信令 (整合负载均衡和 RTPEngine)
    if (is_method("INVITE")) {
        # 如果是内部呼叫(透传FS呼叫)，不需要再次经过 Dispatcher，直接本地寻址
        if (is_present_hf("X-Internal-Call")) {
            route(LOCATION);
        } else {
            # 外部呼叫或坐席起呼，转发到 FreeSWITCH 媒体节点组
            route(DISPATCH);
        }
        exit;
    }

    route(LOCATION);
}

# -------------------------------------------------------------------------
# 子路由: 基础消息中继 (RELAY)
# -------------------------------------------------------------------------
route[RELAY] {
    if (is_method("INVITE|BYE|SUBSCRIBE|UPDATE")) {
        if (!t_is_set("branch_route")) {
            t_on_branch("MANAGE_BRANCH");
        }
    }

    if (is_method("INVITE|SUBSCRIBE|UPDATE")) {
        if (!t_is_set("onreply_route")) {
            t_on_reply("MANAGE_REPLY");
        }
    }

    if (is_method("INVITE")) {
        if (!t_is_set("failure_route")) {
            t_on_failure("MANAGE_FAILURE");
        }
    }

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# -------------------------------------------------------------------------
# 子路由: 会话内请求路由处理 (WITHINDLG)
# -------------------------------------------------------------------------
route[WITHINDLG] {
    if (has_totag()) {
        if (loose_route()) {
            # WebSocket 信令路由适配别名
            if ($du == "") {
                if (!handle_ruri_alias()) {
                    sl_send_reply("400", "Bad Request");
                    exit;
                }
            }

            route(DLGURI);
            if (is_method("ACK")) {
                route(NATMANAGE);
            } else if (is_method("NOTIFY")) {
                record_route();
            }
            route(RELAY);
        } else {
            if (is_method("ACK")) {
                if (t_check_trans()) {
                    route(RELAY);
                    exit;
                } else {
                    exit;
                }
            }
            sl_send_reply("404", "Not Here");
        }
        exit;
    }
}

# -------------------------------------------------------------------------
# 子路由: SIP 注册鉴权逻辑 (AUTH)
# -------------------------------------------------------------------------
route[AUTH] {
#!ifdef WITH_AUTH
    if (is_method("REGISTER") || from_uri == myself) {
        if (!auth_check("$fd", "kamailio_subscriber", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }
        
        # 针对坐席业务注册进行额外的 CTI 后端注册准入鉴权校验 (对应  AuthController.auth)
        if (is_method("REGISTER") && !(search("expires=0") || search("Expires: 0"))) {
            $var(http_body) = '{"username":"$fU","ip":"$si","domain":"$fd"}';
            xlog("L_INFO", "向 CTI 后端执行业务注册准入鉴权: $var(http_body)\n");
            $var(response) = http_connect("ctiserver", "/cti/kamailio/auth", "application/json", $var(http_body), "$avp(result)");
            if ($var(response) != "200") {
                xlog("L_WARN", "业务注册准入鉴权失败，CTI 服务不可达，状态码: $var(response)\n");
                sl_send_reply("500", "Service Unavailable");
                exit;
            }
            
            # 解析 CTI 服务返回的 JSON 判定鉴权状态码
            $var(response_body) = $avp(result);
            jansson_get("code", $var(response_body), "$var(code)");
            if ($var(code) != "200") {
                jansson_get("message", $var(response_body), "$var(message)");
                xlog("L_WARN", "业务注册准入鉴权未通过: 用户: $fU, 拒绝原因: $var(message)\n");
                sl_send_reply("403", "$var(message)");
                exit;
            }
            xlog("L_INFO", "业务注册准入鉴权通过: 用户: $fU\n");
        }

        # 认证通过，清理凭证头
        if (!is_method("REGISTER|PUBLISH")) {
            consume_credentials();
        }
    }
#!endif
    return;
}

# -------------------------------------------------------------------------
# 子路由: REGISTER 注册处理及事务分支异步 Webhook 回调 (方案 B)
# -------------------------------------------------------------------------
route[REGISTRAR] {
    if (is_method("REGISTER")) {
        # 开启 NAT 穿透标记
        if (isflagset(5)) {
            setbflag(6);
        }

        # 保存注册数据至内存/位置表 (usrloc)
        if (!save("location", 4)) {
            sl_reply_error();
            exit;
        }

        # 构造 HTTP Webhook 回调参数，暂存至 AVP 用于后台事务处理
        $avp(reg_username) = $fU;
        $avp(reg_ip) = $si;
        $avp(reg_port) = $sp;
        $avp(reg_domain) = $fd;
        $avp(reg_callid) = $ci;
        $avp(reg_type) = "register";

        # 判定当前动作为注册还是注销 (Expires == 0)
        if (search("expires=0") || search("Expires: 0")) {
            $avp(reg_type) = "unregister";
        }

        # 【核心优化】：创建非阻塞的后台事务分支
        if (t_newtran()) {
            t_on_branch("HTTP_REG_BRANCH"); # 将状态流转投递到后台分支路由处理
            t_release();
        } else {
            xlog("L_WARN", "构建注册 Webhook 后台事务分支失败 - 分机:$fU, Call-ID:$ci\n");
        }

        # 立即对坐席终端回复 200 OK 响应，实现真正的异步非阻塞
        sl_send_reply("200", "Registration Accepted");
        exit;
    }
}

# -------------------------------------------------------------------------
# 后台分支路由: 执行异步 HTTP Webhook (完美适配 Go /cti/kamailio/auth 接口)
# -------------------------------------------------------------------------
branch_route[HTTP_REG_BRANCH] {
    $var(username) = $avp(reg_username);
    $var(ip) = $avp(reg_ip);
    $var(port) = $avp(reg_port);
    $var(domain) = $avp(reg_domain);
    $var(callid) = $avp(reg_callid);
    $var(type) = $avp(reg_type);

    # 构造兼容  和 Go CTI 后端的 JSON Payload
    $var(http_body) = '{"username":"$var(username)","ip":"$var(ip)","port":"$var(port)","domain":"$var(domain)","call_id":"$var(callid)"}';

    if ($var(type) == "unregister") {
        $var(url) = "/cti/kamailio/auth/unregister";
    } else {
        $var(url) = "/cti/kamailio/auth/register";
    }

    xlog("L_INFO", "后台事务执行 HTTP Webhook 回调推送: $var(url), 载荷: $var(http_body)\n");

    # 发起同步 HTTP POST 连结请求 (在后台 branch_route 线程中，不阻塞主 SIP 事务)
    $var(response) = http_connect("ctiserver", "$var(url)", "application/json", $var(http_body), "$avp(result)");

    if ($var(response) != "200") {
        xlog("L_WARN", "注册状态 Webhook 推送失败: $var(url), 目标无响应或状态码: $var(response)\n");
    } else {
        xlog("L_INFO", "注册状态 Webhook 推送成功: $var(url), CTI 响应成功\n");
    }

    # 终止该后台分支以清理事务上下文和资源 (关键)
    drop;
    t_drop();
    exit;
}

# -------------------------------------------------------------------------
# 子路由: FreeSWITCH 节点动态负载均衡与高可用分发 (DISPATCH)
# -------------------------------------------------------------------------
route[DISPATCH] {
    xlog("L_INFO", "呼叫进入 FreeSWITCH 分发器 - Call-ID:$ci, 主叫:$fu, 被叫:$ru\n");

    # 使用算法 11 (Round-Robin / 轮询) 选择目的地组 "1" 中的 FS 媒体服务器
    if (!ds_select_dst("1", "11")) {
        xlog("L_ERR", "分发器故障: 没有可用的 FreeSWITCH 服务器节点 - Call-ID:$ci\n");
        sl_send_reply("500", "No FreeSWITCH Server Available");
        exit;
    }

    xlog("L_INFO", "已成功选中 FreeSWITCH 媒体节点: $du - Call-ID:$ci\n");

    # 注册重试/失败备用路由，如果选中的 FS 宕机或无回应，自动无缝 failover
    t_on_failure("RTF_DISPATCH");

    # 注入跟踪头域
    append_hf("X-Route-Info: via-kamailio\r\n");

    route(RELAY);
    exit;
}

# -------------------------------------------------------------------------
# 失败容灾路由: Dispatcher 备用路由 failover 重试机制 (RTF_DISPATCH)
# -------------------------------------------------------------------------
failure_route[RTF_DISPATCH] {
    if (t_is_canceled()) {
        exit;
    }

    # 当选中的 FS 节点返回 500 级错误或本地发信超时(未回复)时，触发故障转移
    if (t_check_status("500") || (t_branch_timeout() && !t_branch_replied())) {
        xlog("L_WARN", "选中 FreeSWITCH 媒体节点发生故障或超时，开始尝试故障转移 - Call-ID:$ci, 状态码:$T_reply_code\n");

        if (ds_next_dst()) {
            xlog("L_INFO", "Dispatcher 自动寻址下一节点中继: $du - Call-ID:$ci\n");
            t_on_failure("RTF_DISPATCH"); # 递归绑定失败路由
            route(RELAY);
            exit;
        } else {
            xlog("L_ERR", "故障转移失败: 没有任何剩余可用的 FreeSWITCH 节点 - Call-ID:$ci\n");
        }
    } else {
        xlog("L_INFO", "非节点级连接错误，不执行重试机制 - Call-ID:$ci, 状态码:$T_reply_code\n");
    }
}

# -------------------------------------------------------------------------
# 子路由: 坐席本地寻址路由 (LOCATION)
# -------------------------------------------------------------------------
route[LOCATION] {
    if (!lookup("location")) {
        $var(rc) = $rc;
        t_newtran();
        switch ($var(rc)) {
            case -1:
            case -3:
                sl_send_reply("404", "Not Found");
                exit;
            case -2:
                sl_send_reply("405", "Method Not Allowed");
                exit;
        }
    }

    route(RELAY);
    exit;
}

# -------------------------------------------------------------------------
# 子路由: 基础 NAT 检测 (NATDETECT)
# -------------------------------------------------------------------------
route[NATDETECT] {
#!ifdef WITH_NAT
    force_rport();
    if (nat_uac_test("19")) {
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else if (is_first_hop()) {
            set_contact_alias();
        }
        setflag(5); # 设置 NAT 标志
    }
#!endif
    return;
}

# -------------------------------------------------------------------------
# 子路由: 媒体与 NAT 转码处理机制 (NATMANAGE)
# -------------------------------------------------------------------------
route[NATMANAGE] {
#!ifdef WITH_RTPENGINE
    if (is_request()) {
        if (has_totag()) {
            if (check_route_param("nat=yes")) {
                setbflag(6);
            }
            if (check_route_param("rtp=bridge")) {
                setbflag(11);
            }
            if (check_route_param("rtp=ws")) {
                setbflag(8);
            }
        }
    }

    if (!isbflagset(11)) {
        return;
    }

    if (!(isflagset(5) || isbflagset(6) || isbflagset(8))) {
        return;
    }

    # 构造自适应音频参数，普通 SIP (RTP) 与 WebRTC (WSS/SAVPF) 自适应转码桥接
    $xavp(r=>$T_branch_idx) = "replace-origin replace-session-connection";

    if (!nat_uac_test("8")) {
        $xavp(r=>$T_branch_idx) = $xavp(r=>$T_branch_idx) + " trust-address";
    }

    if (isbflagset(8)) {
        # 如果是 WebRTC 通道，进行 DTLS 握手与 ICE 重组
        if ($proto =~ "ws") {
            $xavp(r=>$T_branch_idx) = $xavp(r=>$T_branch_idx) + " rtcp-mux-demux DTLS=off SDES-off ICE=remove RTP/AVP";
        } else {
            $xavp(r=>$T_branch_idx) = $xavp(r=>$T_branch_idx) + " rtcp-mux-offer generate-mid DTLS=passive SDES-off ICE=force RTP/SAVPF";
        }
    } else {
        if ($proto =~ "ws") {
            $xavp(r=>$T_branch_idx) = $xavp(r=>$T_branch_idx) + " generate-mid DTLS=passive SDES-off ICE=force";
        }
    }

    rtpengine_manage($xavp(r=>$T_branch_idx));

    if (is_request()) {
        if (!has_totag()) {
            if (t_is_branch_route()) {
                if (isbflagset(6)) {
                    add_rr_param(";nat=yes");
                }
                if (isbflagset(11)) {
                    add_rr_param(";rtp=bridge");
                }
                if (isbflagset(8)) {
                    add_rr_param(";rtp=ws");
                }
            }
        }
    }
#!endif
    return;
}

# -------------------------------------------------------------------------
# 子路由: 目的地 URI 修正 (DLGURI)
# -------------------------------------------------------------------------
route[DLGURI] {
    if (!isdsturiset()) {
        handle_ruri_alias();
    }
    return;
}

# -------------------------------------------------------------------------
# 子路由: 媒体自适应转码参数映射桥接 (BRIDGING)
# -------------------------------------------------------------------------
route[BRIDGING] {
    if (!has_totag()) {
        if ($proto =~ "ws" && !($ru =~ "transport=ws")) {
            setbflag(8); # 目标或源为 WebSocket
        } else if (!($proto =~ "ws") && $ru =~ "transport=ws") {
            setbflag(8);
        }
    }
}

# -------------------------------------------------------------------------
# 分支路由: 执行分支参数绑定与初始化 (MANAGE_BRANCH)
# -------------------------------------------------------------------------
branch_route[MANAGE_BRANCH] {
    t_on_branch_failure("rtpengine");
    setbflag(11); # 默认激活 rtpengine bridge
    route(BRIDGING);
    route(NATMANAGE);
}

# -------------------------------------------------------------------------
# 答复路由: 针对 SIP 应答执行媒体更新管理 (MANAGE_REPLY)
# -------------------------------------------------------------------------
onreply_route[MANAGE_REPLY] {
    if (status =~ "[12][0-9][0-9]") {
        route(NATMANAGE);
    }
}

# -------------------------------------------------------------------------
# 失败会话清除路由: (MANAGE_FAILURE)
# -------------------------------------------------------------------------
failure_route[MANAGE_FAILURE] {
    xlog("L_INFO", "呼叫信令发送失败 - 方法:$rm, 应答状态:$rs, Call-ID:$ci\n");
}

#!ifdef WITH_WEBSOCKETS
onreply_route {
    if (nat_uac_test(64)) {
        add_contact_alias();
    }
}

event_route[tm:branch-failure:rtpengine] {
    $avp(extra_id) = @via[1].branch + $T_branch_idx;
    rtpengine_delete("via-branch=extra");
}

event_route[websocket:closed] {
    xlog("L_INFO", "WebSocket 连接被对端关闭 - 来源:$si:$sp\n");
}
#!endif

# -------------------------------------------------------------------------
# HTTP 与 WebSocket 请求分发处理路由 (event_route[xhttp:request])
# -------------------------------------------------------------------------
event_route[xhttp:request] {
    set_reply_close();
    set_reply_no_connect();

    # 1. 处理 WebSocket 握手升级请求
    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade") {
        if (ws_handle_handshake()) {
            exit;
        }
        xhttp_reply("400", "Bad Request", "text/plain", "WebSocket handshake failed");
        exit;
    }

    # 2. 处理动态 Dispatcher 重新加载请求 (通过 HTTP GET /dispatcher/reload)
    if ($hu =~ "^/dispatcher/reload") {
        ds_reload();
        xhttp_reply("200", "OK", "text/plain", "Dispatcher reloaded successfully");
        exit;
    }

    # 3. 处理动态 RTPEngine 重新加载请求 (通过 HTTP GET /rtpengine/reload)
    if ($hu =~ "^/rtpengine/reload") {
        jsonrpc_exec('{"jsonrpc":"2.0", "method":"rtpengine.reload"}');
        xhttp_reply("200", "OK", "text/plain", "RTPEngine reloaded successfully");
        exit;
    }

    xhttp_reply("404", "Not Found", "text/plain", "Endpoint not found");
    exit;
}

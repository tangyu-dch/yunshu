<svg width="900" height="550" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" fill="#07111f" rx="16"/>
  <text x="450" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">事件与工作流</text>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1677ff"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52c41a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#faad14"/>
    </marker>
  </defs>

  <!-- Top Row: FS -> Event Adapter -->
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="50" y="80" width="120" height="60" rx="6" fill="#0f172a" stroke="#52c41a" stroke-width="2"/>
    <text x="110" y="110" font-size="13" fill="#fff">FreeSWITCH</text>
    <text x="110" y="130" font-size="11" fill="#93c5fd">媒体服务器</text>

    <rect x="210" y="80" width="130" height="60" rx="6" fill="#0f172a" stroke="#52c41a" stroke-width="2"/>
    <text x="275" y="110" font-size="13" fill="#fff">Event Adapter</text>
    <text x="275" y="130" font-size="11" fill="#93c5fd">事件适配</text>

    <rect x="380" y="80" width="130" height="60" rx="6" fill="#0f172a" stroke="#1677ff" stroke-width="2"/>
    <text x="445" y="110" font-size="13" fill="#fff">Session Service</text>
    <text x="445" y="130" font-size="11" fill="#93c5fd">会话管理</text>

    <rect x="550" y="80" width="110" height="60" rx="6" fill="#0f172a" stroke="#1677ff" stroke-width="2"/>
    <text x="605" y="110" font-size="13" fill="#fff">Event Bus</text>
    <text x="605" y="130" font-size="11" fill="#93c5fd">事件总线</text>

    <!-- Middle: Workflows -->
    <rect x="80" y="200" width="130" height="60" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
    <text x="145" y="230" font-size="13" fill="#fff">CTI Workflow</text>
    <text x="145" y="250" font-size="11" fill="#c4b5fd">业务编排</text>

    <rect x="260" y="200" width="130" height="60" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
    <text x="325" y="230" font-size="13" fill="#fff">ESL Workflow</text>
    <text x="325" y="250" font-size="11" fill="#c4b5fd">状态机</text>

    <rect x="440" y="200" width="130" height="60" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
    <text x="505" y="230" font-size="13" fill="#fff">Command Builder</text>
    <text x="505" y="250" font-size="11" fill="#c4b5fd">命令构建</text>

    <!-- Bottom: Outbox and Workers -->
    <rect x="200" y="340" width="130" height="60" rx="6" fill="#0f172a" stroke="#faad14" stroke-width="2"/>
    <text x="265" y="370" font-size="13" fill="#fff">CDR Outbox</text>
    <text x="265" y="390" font-size="11" fill="#fde68a">Redis Stream</text>

    <rect x="380" y="340" width="130" height="60" rx="6" fill="#0f172a" stroke="#faad14" stroke-width="2"/>
    <text x="445" y="370" font-size="13" fill="#fff">cc-worker</text>
    <text x="445" y="390" font-size="11" fill="#fde68a">异步处理</text>

    <!-- Worker outputs -->
    <rect x="80" y="440" width="80" height="50" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
    <text x="120" y="465" font-size="12" fill="#fff">CDR</text>

    <rect x="190" y="440" width="80" height="50" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
    <text x="230" y="465" font-size="12" fill="#fff">计费</text>

    <rect x="300" y="440" width="80" height="50" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
    <text x="340" y="465" font-size="12" fill="#fff">录音</text>

    <rect x="410" y="440" width="80" height="50" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
    <text x="450" y="465" font-size="12" fill="#fff">Webhook</text>

    <rect x="520" y="440" width="80" height="50" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
    <text x="560" y="465" font-size="12" fill="#fff">报表</text>
  </g>

  <!-- Arrows -->
  <g stroke="#52c41a" stroke-width="2" fill="none" marker-end="url(#arrow-green)">
    <path d="M 170 110 L 210 110"/>
  </g>
  <g stroke="#1677ff" stroke-width="2" fill="none" marker-end="url(#arrow-blue)">
    <path d="M 340 110 L 380 110"/>
    <path d="M 510 110 L 550 110"/>
  </g>
  <g stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrow-purple)">
    <path d="M 605 140 L 325 200"/>
    <path d="M 445 140 L 145 200"/>
    <path d="M 275 260 L 440 230"/>
    <path d="M 570 230 L 170 340"/>
    <path d="M 510 260 L 445 340"/>
  </g>
  <g stroke="#faad14" stroke-width="2" fill="none" marker-end="url(#arrow-yellow)">
    <path d="M 330 370 L 160 440"/>
    <path d="M 360 370 L 230 440"/>
    <path d="M 390 370 L 340 440"/>
    <path d="M 420 370 L 450 440"/>
    <path d="M 450 370 L 560 440"/>
  </g>

  <!-- Labels -->
  <g font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">
    <text x="190" y="100">ESL Events</text>
    <text x="360" y="100">TelephonyEvent</text>
    <text x="530" y="100">fs-applied</text>
    <text x="380" y="215">execute</text>
  </g>
</svg>
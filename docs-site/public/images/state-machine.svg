<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#07111f" rx="16"/>
  <text x="450" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">呼叫状态机</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1677ff"/>
    </marker>
  </defs>

  <!-- State boxes -->
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <ellipse cx="120" cy="120" rx="60" ry="35" fill="#0f172a" stroke="#1677ff" stroke-width="2"/>
    <text x="120" y="125" font-size="13" fill="#fff">init</text>

    <ellipse cx="270" cy="120" rx="60" ry="35" fill="#0f172a" stroke="#52c41a" stroke-width="2"/>
    <text x="270" y="125" font-size="13" fill="#fff">agent_created</text>

    <ellipse cx="420" cy="120" rx="60" ry="35" fill="#0f172a" stroke="#52c41a" stroke-width="2"/>
    <text x="420" y="125" font-size="13" fill="#fff">agent_progress</text>

    <ellipse cx="570" cy="120" rx="60" ry="35" fill="#0f172a" stroke="#52c41a" stroke-width="2"/>
    <text x="570" y="125" font-size="13" fill="#fff">agent_progress_media</text>

    <ellipse cx="720" cy="120" rx="60" ry="35" fill="#0f172a" stroke="#52c41a" stroke-width="2"/>
    <text x="720" y="125" font-size="13" fill="#fff">agent_answered</text>

    <!-- Customer states -->
    <ellipse cx="270" cy="250" rx="65" ry="35" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
    <text x="270" y="255" font-size="13" fill="#fff">customer_created</text>

    <ellipse cx="420" cy="250" rx="70" ry="35" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
    <text x="420" y="255" font-size="13" fill="#fff">customer_progress</text>

    <ellipse cx="570" cy="250" rx="85" ry="35" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
    <text x="570" y="255" font-size="13" fill="#fff">customer_progress_media</text>

    <ellipse cx="720" cy="250" rx="70" ry="35" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
    <text x="720" y="255" font-size="13" fill="#fff">customer_answered</text>

    <!-- Bridge and complete -->
    <ellipse cx="450" cy="380" rx="60" ry="35" fill="#0f172a" stroke="#faad14" stroke-width="2"/>
    <text x="450" y="385" font-size="13" fill="#fff">bridged</text>

    <ellipse cx="700" cy="380" rx="60" ry="35" fill="#0f172a" stroke="#ff4d4f" stroke-width="2"/>
    <text x="700" y="385" font-size="13" fill="#fff">complete</text>
  </g>

  <!-- Arrow labels -->
  <g font-family="Arial, sans-serif" font-size="10" fill="#1677ff" text-anchor="middle">
    <text x="195" y="110">CHANNEL_CREATE</text>
    <text x="345" y="110">CHANNEL_PROGRESS</text>
    <text x="495" y="110">CHANNEL_PROGRESS_MEDIA</text>
    <text x="645" y="110">CHANNEL_ANSWERED</text>

    <text x="345" y="240">CHANNEL_CREATE</text>
    <text x="495" y="240">CHANNEL_PROGRESS</text>
    <text x="645" y="240">CHANNEL_PROGRESS_MEDIA</text>
    <text x="720" y="300">CHANNEL_ANSWERED</text>

    <text x="570" y="370">CHANNEL_BRIDGE</text>
    <text x="580" y="400">CHANNEL_HANGUP_COMPLETE</text>
  </g>

  <!-- Arrows -->
  <g stroke="#1677ff" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 180 120 L 210 120"/>
    <path d="M 330 120 L 360 120"/>
    <path d="M 480 120 L 510 120"/>
    <path d="M 630 120 L 660 120"/>

    <path d="M 720 155 L 720 215"/>
    <path d="M 660 250 L 600 250"/>
    <path d="M 500 250 L 460 250"/>
    <path d="M 335 250 L 305 250"/>

    <path d="M 720 285 L 720 345"/>
    <path d="M 600 285 L 500 345"/>

    <path d="M 510 380 L 640 380"/>
  </g>

  <!-- Event Legend -->
  <g font-family="Arial, sans-serif" font-size="12" fill="#fff">
    <text x="50" y="430" font-weight="bold">关键事件:</text>
    <text x="50" y="450">CHANNEL_CREATE = 通道创建</text>
    <text x="50" y="470">CHANNEL_PROGRESS = 180 振铃</text>
    <text x="350" y="450">CHANNEL_ANSWERED = 接听</text>
    <text x="350" y="470">CHANNEL_BRIDGE = 桥接</text>
  </g>
</svg>
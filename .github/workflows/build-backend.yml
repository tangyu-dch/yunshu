name: Yunshu Backend Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        run: cd web && npm ci

      - name: Run Backend Tests
        run: go test -v ./...

      - name: Build Go Services
        run: |
          mkdir -p bin
          for service in cc-edge cc-console cc-call cc-worker cc-all; do
            GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/${service}-linux-amd64 ./cmd/${service}
            GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o bin/${service}-darwin-arm64 ./cmd/${service}
          done

      - name: Build Frontend Dashboard
        run: cd web && npm run build

      - name: Archive Frontend Dist
        run: tar -czf bin/web-dist.tar.gz -C web dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yunshu-backend-builds
          path: bin/
          if-no-files-found: error

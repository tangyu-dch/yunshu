services:
  # =========================================================================
  # 1. MySQL 数据库服务：存储呼叫配置、分机账号及网关节点
  # =========================================================================
  mysql:
    image: mysql:8.0
    container_name: cc-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: db123456
      MYSQL_DATABASE: yunshu
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - callcenter_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdb123456"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =========================================================================
  # 2. Redis 缓存服务：存储坐席分机实时状态、选号资源锁与话务临时数据
  # =========================================================================
  redis:
    image: redis:7.0-alpine
    container_name: cc-redis
    restart: always
    ports:
      - "63790:6379"
    volumes:
      - redis_data:/data
    networks:
      - callcenter_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =========================================================================
  # 3. RTPEngine 媒体代理服务：自适应 WebRTC 与 传统 SIP 音频转码桥接
  # =========================================================================
  rtpengine:
    image: jambonz/rtpengine:latest
    container_name: cc-rtpengine
    platform: linux/amd64
    restart: always
    environment:
      - RTP_START_PORT=30000
      - RTP_END_PORT=30100
      - LOGLEVEL=6
    command:
      - rtpengine
      - --listen-ng=2223
    ports:
      - "2223:2223/udp"                # RTPEngine 控制命令端口 (NG Protocol)
      - "30000-30100:30000-30100/udp"
    networks:
      - callcenter_net
    depends_on:
      - mysql
      - redis

  # =========================================================================
  # 4. FreeSWITCH 媒体节点服务：处理具体呼叫路由与 IVR 音频逻辑
  # =========================================================================
  freeswitch:
    image: bytedesk/freeswitch:latest
    container_name: cc-freeswitch
    restart: always
    ports:
      - "5080:5080/udp"                # FreeSWITCH 内网/Trunk 监听端口
      - "8021:8021"                    # FreeSWITCH ESL 控制命令面接口
    environment:
      - ESL_PASSWORD=ClueCon
    networks:
      - callcenter_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =========================================================================
  # 5. Kamailio 信令网关与注册服务：处理坐席注册、动态均衡分发与 NAT 穿透
  # =========================================================================
  kamailio:
    image: ghcr.io/kamailio/kamailio:6.1.2-bookworm
    container_name: cc-kamailio
    platform: linux/amd64              # 使用 macOS Rosetta 仿真高速运行 x86_64 生产镜像
    restart: always
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5066:5066/tcp"
    volumes:
      - ./configs/kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
    # 【核心魔术】：在容器启动入口处利用 substdef 动态注入容器网络链接，避免更改源码文件
    entrypoint:
      - kamailio
      - -DD
      - -E
      - -f
      - /etc/kamailio/kamailio.cfg
      - --substdef
      - '!DEFAULT_MYSQL_ADDR!mysql://root:db123456@mysql:3306/yunshu!g'
      - --substdef
      - '!DEFAULT_HTTP_ADDR!host.docker.internal:8082!g'
      - --substdef
      - '!DEFAULT_RTPENGINE_SOCK!udp:rtpengine:2223!g'
      - --substdef
      - '!MY_IP4_ADDR!0.0.0.0!g'
      - --substdef
      - '!DEFAULT_EXTERNAL_IP!127.0.0.1!g'
    extra_hosts:
      - "host.docker.internal:host-gateway" # 允许容器解析宿主机主机名，打通 Go CTI 端点
    networks:
      - callcenter_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rtpengine:
        condition: service_started
      freeswitch:
        condition: service_started

networks:
  callcenter_net:
    name: callcenter_net
    driver: bridge

volumes:
  mysql_data:
    name: cc_mysql_data
  redis_data:
    name: cc_redis_data
